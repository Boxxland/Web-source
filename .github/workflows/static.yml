# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@a5ac7e51b41094c7467395007f7f39a1f113284f
      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae94b8be564content17e5fa3f9cd3f
      - name: Upload artifact
        uses: actions/upload-pages-artifact@65b5dde5183dcc05f65b25c893b91e2927ae4d07
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164830d3c02d7c87b7a986bcd13e14b48b
